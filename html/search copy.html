<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>
            SEARCH
        </title>
        <link rel="stylesheet" href="../public/search.css">
    </head>
    <body>
        <div class="hero"> 
            <form method="POST" action="/search">
                <div class="form-card">
                    <section class="name">
                        <label for="name">
                            Name:
                        </label>
                        <input type="text" placeholder="Name" id="name" name="name" >
                    </section>
                    <section class="enrol">
                        <label for="enrol">
                            Enrollment Number:
                        </label>
                        <input type="text" id="enrol" placeholder="Enrollment Number" name="enrol">
                    </section>
                    <section class="reg">
                        <label for="reg">
                            Registration Number:
                        </label>
                        <input type="number" id="reg" placeholder="Registration Number" name="reg">
                </section>
                <section class="branch">
                    <label for="branch">
                        Branch:
                    </label>
                    <input type="text" id="branch" placeholder="Branch" name="branch">
                </section>
                <section class="section">
                    <label for="section">
                        Section:
                    </label>
                    <input type="text" id="section" placeholder="Section" name="section">
                </section>
                <section class="phone">
                    <label for="phone">
                        Phone Number:
                    </label>
                    <input type="number" id="phone" placeholder="Phone Number" name="phone">
                </section>
                <section class="email">
                    <label for="email">
                        Email:
                    </label>
                    <input type="email" id="email" placeholder="Email" name="email">
                </section>
                <section class="insta">
                    <label for="insta">
                        Instagram:
                    </label>
                    <input type="text" id="insta" placeholder="Instagram" name="insta">
                </section>
            </div>
        </div>
            <div class="button">
                <button type="submit" id="button">SEARCH</button>
            </div>
            
        </form>
        <div>

            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Enrollment Number</th>                        
                        <th>Registration Number</th>
                        <th>Branch</th>                        
                        <th>Section</th>
                        <th>Phone Number</th>
                        <th>Email</th>
                        <th>Instagram</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
            <script>
                const load = document.getElementById("name");
                let data = [];
                let users = [];
                load.addEventListener("mouseover",async () =>{
                    const response = await fetch("/api/students");
                    data = await response.json();
                    console.log(data);
                 });
                const input = document.getElementById("name");
                input.addEventListener("input",()=>{
                    users = data.filter(user=>{
                        return user.name.toLowerCase().includes(input.value.toLowerCase());
                    });
                    console.log(users);
                })
                function rendertable(users){
                    const tbody = document.querySelector("tbody");
                    tbody.innerHTML = ""
                    users.forEach(user=>{
                        const row = document.createElement("tr");
                        const name = document.createElement("td");
                        const enrol = document.createElement("td");
                        const reg = document.createElement("td");
                        const branch = document.createElement("td");
                        const section = document.createElement("td");
                        const phone = document.createElement("td");
                        const email = document.createElement("td");
                        const insta = document.createElement("td");
                        name.textContent = "users.name";
                        enrol.textContent = "users.enrollment_number";
                        reg.textContent = "users.registration_number";
                        branch.textContent = "users.branch";
                        section.textContent = "users.section";
                        phone.textContent = "users.phone_number";
                        email.textContent = "users.email";
                        insta.textContent = "users.instagram";
                        row.append(name);
                        row.append(enrol);
                        row.append(reg);
                        row.append(branch);
                        row.append(section);
                        row.append(phone);
                        row.append(email);
                        row.append(insta);
                        tbody.append(row);
                });
                }
                rendertable(users);
            </script>
    </body>
</html>
